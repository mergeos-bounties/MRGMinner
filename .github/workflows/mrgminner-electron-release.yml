name: Build MRGMinner Electron apps

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag to create or update. Defaults to mrgminner-electron-latest.
        required: false
        type: string
  push:
    branches:
      - master
    tags:
      - "v*"
      - "mrgminner-v*"
      - "mrgminner-electron-v*"
    paths:
      - "bin/**"
      - "src/**"
      - "docs/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/mrgminner-electron-release.yml"

permissions:
  contents: write

env:
  ELECTRON_DEFAULT_RELEASE_TAG: mrgminner-electron-latest

concurrency:
  group: mrgminner-electron-${{ github.ref }}
  cancel-in-progress: true

jobs:
  electron-build:
    name: Build Electron app (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: npm run build:electron:win
            artifact_name: MRGMinner-Electron-Windows-x64
          - os: ubuntu-latest
            script: npm run build:electron:linux
            artifact_name: MRGMinner-Electron-Linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Test MRGMinner
        run: npm test

      - name: Smoke Electron main
        if: runner.os == 'Windows'
        run: npm run electron:smoke

      - name: Build Electron app
        run: ${{ matrix.script }}

      - name: Generate checksums
        shell: pwsh
        run: |
          $out = "dist/electron"
          if (-not (Test-Path $out)) {
            throw "Electron output directory is missing: $out"
          }
          $files = Get-ChildItem -Path $out -File | Where-Object {
            $_.Name -match '\.(exe|AppImage|tar\.gz)$'
          }
          if (-not $files) {
            throw "No Electron release artifacts were produced."
          }
          foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)" | Set-Content -Path "$($file.FullName).sha256" -Encoding ascii
          }
          $manifest = [ordered]@{
            product = "MRGMinner Electron"
            repository = $env:GITHUB_REPOSITORY
            commit = $env:GITHUB_SHA
            ref = $env:GITHUB_REF
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            runner_os = $env:RUNNER_OS
            built_at = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            artifacts = @($files | ForEach-Object {
              [ordered]@{
                name = $_.Name
                size = $_.Length
                sha256 = (Get-FileHash -Path $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              }
            })
          }
          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Path "$out/MRGMinner-Electron-$env:RUNNER_OS.build.json" -Encoding utf8

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/electron/*.exe
            dist/electron/*.AppImage
            dist/electron/*.tar.gz
            dist/electron/*.sha256
            dist/electron/*.build.json
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish Electron release
    needs: electron-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || github.ref == 'refs/heads/master'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Resolve release target
        shell: pwsh
        env:
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || '' }}
        run: |
          $tag = $env:RELEASE_TAG_INPUT
          if (-not $tag -and "${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          }
          if (-not $tag) {
            $tag = $env:ELECTRON_DEFAULT_RELEASE_TAG
          }
          $repoUrl = "https://github.com/$env:GITHUB_REPOSITORY"
          "ELECTRON_RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "ELECTRON_RELEASE_URL=$repoUrl/releases/tag/$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:ELECTRON_RELEASE_TAG
          $releaseTitle = if ($tag -eq $env:ELECTRON_DEFAULT_RELEASE_TAG) {
            "MRGMinner Electron latest"
          } else {
            "MRGMinner Electron $tag"
          }
          $releaseNotes = "MRGMinner Electron desktop builds for Windows and Linux.`n`nWindows: portable .exe`nLinux: AppImage and tar.gz`nCommit: $env:GITHUB_SHA"

          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --target $env:GITHUB_SHA --title $releaseTitle --notes $releaseNotes --latest
          } else {
            gh release edit $tag --target $env:GITHUB_SHA --title $releaseTitle --notes $releaseNotes --latest
          }

          $files = Get-ChildItem -Path release-assets -Recurse -File
          if (-not $files) {
            throw "No downloaded Electron assets found."
          }
          gh release upload $tag @($files.FullName) --clobber

          "### MRGMinner Electron release" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- Release: $env:ELECTRON_RELEASE_URL" >> $env:GITHUB_STEP_SUMMARY
          "- Commit: $env:GITHUB_SHA" >> $env:GITHUB_STEP_SUMMARY
          foreach ($file in $files) {
            "- $($file.Name)" >> $env:GITHUB_STEP_SUMMARY
          }
