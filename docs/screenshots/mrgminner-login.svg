<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180">
  <rect width="720" height="180" rx="6" fill="#1e1e2e"/>
  <rect x="0" y="0" width="720" height="24" rx="6" fill="#313244"/>
  <rect x="0" y="18" width="720" height="6" fill="#313244"/>
  <circle cx="14" cy="12" r="5" fill="#f38ba8"/>
  <circle cx="30" cy="12" r="5" fill="#fab387"/>
  <circle cx="46" cy="12" r="5" fill="#a6e3a1"/>
  <text x="720" y="13" text-anchor="end" fill="#6c7086" font-family="monospace" font-size="10">MRGMinner Login</text>

  <text x="20" y="48" fill="#f5c2e7" font-family="monospace" font-size="12">$</text>
  <text x="32" y="48" fill="#cdd6f4" font-family="monospace" font-size="12">mrgminner login --email you@example.com --password ****</text>

  <text x="20" y="68" fill="#a6e3a1" font-family="monospace" font-size="11">✓</text>
  <text x="32" y="68" fill="#94e2d5" font-family="monospace" font-size="11">Authenticated</text>

  <text x="20" y="88" fill="#6c7086" font-family="monospace" font-size="10">token:</text>
  <text x="120" y="88" fill="#cdd6f4" font-family="monospace" font-size="10">eyJhbGciOi...XxX (JWT)</text>
  <text x="20" y="100" fill="#6c7086" font-family="monospace" font-size="10">worker:</text>
  <text x="120" y="100" fill="#cdd6f4" font-family="monospace" font-size="10">github:yourname</text>
  <text x="20" y="112" fill="#6c7086" font-family="monospace" font-size="10">tip_ready:</text>
  <text x="120" y="112" fill="#a6e3a1" font-family="monospace" font-size="10">true</text>

  <text x="20" y="136" fill="#6c7086" font-family="monospace" font-size="10">Credentials saved. Token is valid for 24 hours.</text>

  <text x="20" y="160" fill="#f5c2e7" font-family="monospace" font-size="12">$</text>
  <text x="32" y="160" fill="#cdd6f4" font-family="monospace" font-size="12">mrgminner status</text>

  <text x="20" y="176" fill="#a6e3a1" font-family="monospace" font-size="11">✓</text>
  <text x="32" y="176" fill="#94e2d5" font-family="monospace" font-size="11">Worker healthy — ready to claim</text>

</svg>